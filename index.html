<!DOCTYPE html>
<html>
<head>
  <title>Frog Cross</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
  <style>
    body { margin: 0; padding: 20px; background: linear-gradient(180deg, #111, #333); font-family: 'Courier New', monospace; color: #fff; }
    .container { display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    canvas { 
      width: 95vw; max-width: 1400px; 
      height: 70vh; max-height: 800px; 
      border: 4px solid #0ff; box-shadow: 0 0 30px #0ff; 
      background: #000;
    }
    .ui { margin: 20px 0; text-align: center; }
    button { 
      background: #0ff; color: #000; border: none; padding: 12px 24px; 
      font-size: 18px; font-family: inherit; cursor: pointer; 
      border-radius: 8px; margin: 0 10px; box-shadow: 0 4px #0cc;
    }
    button:hover { background: #fff; box-shadow: 0 6px #0cc; transform: translateY(-2px); }
    button:active { transform: translateY(0); }
    .level-buttons { margin: 10px 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="ui">
      <div id="score">Score: 0 | High Score: 0 | Lives: 3</div>
      <div id="level">Level 1 (Easy)</div>
      <div class="level-buttons">
        <button onclick="setLevel(1)">Easy</button>
        <button onclick="setLevel(2)">Medium</button>
        <button onclick="setLevel(3)">Hard</button>
        <button onclick="resetGame()">Restart</button>
      </div>
    </div>
    <canvas id="gameCanvas"></canvas>
  </div>
  <script src="app.js"></script>
</body>
</html>
